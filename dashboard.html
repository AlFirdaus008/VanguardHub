<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ========== CSS ========== -->
    <link rel="stylesheet" href="styles/dashboard.css" />

    <!-- Boxicons CSS -->
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />

    <title>Vanguard Management Hub</title>
  </head>
  <body>
    <nav class="sidebar close">
      <header>
        <div class="image-text">
          <span class="image">
            <img src="assets/logo_bg.png" alt="logo" />
          </span>
          <div class="text header-text">
            <span class="name">Vanguard</span>
            <span class="job">Management Hub</span>
          </div>
        </div>

        <i class="bx bx-chevron-right toggle"></i>
      </header>

      <div class="menu-bar">
        <div class="menu">
          <li class="search-box">
            <a href="#">
              <i class="bx bx-search-alt-2 icon"></i>
              <input type="search" placeholder="Search..." />
            </a>
          </li>
          <ul class="menu-links">
            <li class="nav-link">
              <a href="dashboard.html">
                <i class="bx bx-home icon"></i>
                <span class="text nav-text">Dashboard</span>
              </a>
            </li>
            <li class="nav-link">
              <a href="courses.html">
                <i class="bx bxs-file icon"></i>
                <span class="text nav-text">Courses</span>
              </a>
            </li>
            <li class="nav-link">
              <a href="agendas.html">
                <i class="bx bx-calendar icon"></i>
                <span class="text nav-text">Class Schedule</span>
              </a>
            </li>
            <li class="nav-link">
              <a href="management_class.html">
                <i class="bx bxs-book-content icon"></i>
                <span class="text nav-text">Management Class</span>
              </a>
            </li>
            <li class="nav-link">
              <a href="friends.html">
                <i class="bx bx-user icon"></i>
                <span class="text nav-text">Members</span>
              </a>
            </li>
            <li class="nav-link">
              <a href="team_project.html">
                <i class="bx bx-group icon"></i>
                <span class="text nav-text">Team Project</span>
              </a>
            </li>
          </ul>
        </div>
        <div class="bottom-content">
          <li class="">
            <a href="#">
              <i class="bx bx-log-out icon"></i>
              <span class="text nav-text">Log Out </span>
            </a>
          </li>
          <li class="mode">
            <div class="moon-sun">
              <i class="bx bx-moon icon moon"></i>
              <i class="bx bx-sun icon sun"></i>
            </div>
            <span class="mode-text text">Dark mode</span>

            <div class="toggle-switch">
              <span class="switch"></span>
            </div>
          </li>
        </div>
      </div>
    </nav>
    <section class="home">
      <div class="text">Dashboard</div>
    </section>
    <script src="scripts/sidebars.js"></script>
  </body>
</html>
